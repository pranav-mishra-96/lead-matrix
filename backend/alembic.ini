# Alembic configuration
# Database URL is set at runtime from app.config.Settings — do NOT put it here

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of migration slug (trimmed from the message)
truncate_slug_length = 40

# Path separator for scripts
path_separator = os

# Blank — env.py injects from Settings
sqlalchemy.url =


[post_write_hooks]
# Not using any hooks for this PoC


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S