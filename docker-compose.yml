# Strategic Lead Matrix — Docker Compose orchestration
# Run with: docker compose up --build

services:
  # ==========================================================================
  # PostgreSQL — persistent storage for conversations, messages, lead profiles
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: lead-matrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      # Persistent data — survives container rebuilds
      - postgres_data:/var/lib/postgresql/data
      # One-time initialization script (extensions, etc.)
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lead-matrix-net

  # ==========================================================================
  # Redis — session state, streaming pub/sub, future scaling
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: lead-matrix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lead-matrix-net

  # ==========================================================================
  # Backend — FastAPI + LangGraph agent
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lead-matrix-backend
    restart: unless-stopped
    environment:
      # LLM
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # Database
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      # App
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lead-matrix-net

  # ==========================================================================
  # Frontend — React + TypeScript + Vite
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lead-matrix-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload, but preserve container's node_modules
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    depends_on:
      - backend
    networks:
      - lead-matrix-net

# ============================================================================
# Named volumes — managed by Docker, survive `docker compose down`
# Destroy with `docker compose down -v` (careful: loses all data)
# ============================================================================
volumes:
  postgres_data:
    name: lead-matrix-postgres-data
  redis_data:
    name: lead-matrix-redis-data

# ============================================================================
# Shared network — services reach each other by service name
# e.g. backend connects to postgres at host "postgres"
# ============================================================================
networks:
  lead-matrix-net:
    name: lead-matrix-net
    driver: bridge